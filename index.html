<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Главная страница XBOX</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-container">
        <a href="#"><img src="img/logo.svg" alt="логотип XBOX" /></a>
        <ul class="nav-list">
          <li>
            <a href="#">Games</a><img src="./img/down-arrow.png" alt="" />
          </li>
          <li>
            <a href="#">Consoles</a><img src="./img/down-arrow.png" alt="" />
          </li>
          <li><a href="#">Community</a></li>
          <input
            type="text"
            class="search-input"
            name="username"
            placeholder="Search"
          />
          <li>
            <a href="#"><img src="img/user.svg" alt="" /> My XBOX</a>
            <img src="./img/down-arrow.png" alt="" />
          </li>
        </ul>
      </div>
    </header>
    <main>
      <!-- Hero секция -->
      <section class="hero">
        <div class="container hero-container">
          <div class="hero-content">
            <h1 class="hero-title">Call of Duty: WWII</h1>
            <h2 class="hero-subtitle">Released on: 23/11/2</h2>
            <div class="hero-buttons">
              <button class="btn btn-primary">Order Now</button>
              <button class="btn btn-primary">More Games</button>
            </div>
          </div>
        </div>
      </section>
      
      </section>
    </main>
  </body>
</html>
